<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Quelou System your #1 solution worldwide</title>

<!-- PDF + EXCEL -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<style>

:root{
    --blue:#0a84ff;
    --green:#22c55e;
    --orange:#f59e0b;
    --red:#ef4444;
    --bg:#f4f7fb;
    --card:#fff;
    --line:#e5e7eb;
    --text:#111827;
    --shadow:0 10px 25px rgba(0,0,0,.07);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

button{
    cursor:pointer;
}

/* LOGIN */

.login{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-card{
    width:100%;
    max-width:420px;
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:var(--shadow);
}

.login-card h1{
    color:var(--blue);
    margin-bottom:10px;
}

.input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#f3f4f6;
    margin-top:15px;
}

.btn{
    border:none;
    padding:13px 18px;
    border-radius:12px;
    color:white;
    font-weight:bold;
}

.primary{background:var(--blue);}
.green{background:var(--green);}
.orange{background:var(--orange);}
.red{background:var(--red);}

.w100{
    width:100%;
}

/* APP */

.app{
    display:flex;
}

.sidebar{
    width:280px;
    background:white;
    border-right:1px solid #ddd;
    padding:20px;
    position:fixed;
    top:0;
    left:0;
    bottom:0;
    overflow:auto;
}

.sidebar h2{
    color:var(--blue);
}

.menu{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.menu button{
    border:none;
    background:#f3f4f6;
    padding:15px;
    border-radius:14px;
    text-align:left;
    font-weight:bold;
}

.menu button:hover{
    background:var(--blue);
    color:white;
}

.main{
    margin-left:280px;
    width:100%;
    padding:20px;
}

.topbar{
    background:white;
    padding:18px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:var(--shadow);
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:var(--shadow);
}

.card h3{
    color:gray;
    margin-bottom:10px;
}

.value{
    font-size:30px;
    font-weight:bold;
}

.table-box{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    overflow:auto;
    box-shadow:var(--shadow);
}

.table-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    flex-wrap:wrap;
    gap:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:700px;
}

th,td{
    padding:14px;
    border-bottom:1px solid #eee;
    text-align:left;
    font-size:14px;
}

.status-paid{
    background:#dcfce7;
    color:#166534;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
}

.status-pending{
    background:#fef3c7;
    color:#92400e;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:bold;
}

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:20px;
}

.popup-box{
    width:100%;
    max-width:900px;
    background:white;
    border-radius:24px;
    padding:25px;
    max-height:90vh;
    overflow:auto;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

textarea{
    width:100%;
    min-height:100px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#f3f4f6;
    margin-top:12px;
}

.action{
    display:flex;
    gap:10px;
    margin-top:15px;
    flex-wrap:wrap;
}

.report-card{
    border:1px solid #ddd;
    border-radius:16px;
    padding:18px;
    margin-bottom:15px;
}

.report-card h3{
    margin-bottom:10px;
}

@media(max-width:900px){

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .main{
        margin-left:0;
    }

    .app{
        flex-direction:column;
    }

    .grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>
<body>

<div id="app"></div>

<script>

/* =========================
STORAGE
========================= */

function load(key){
    return JSON.parse(localStorage.getItem(key) || "[]");
}

function save(key,data){
    localStorage.setItem(key,JSON.stringify(data));
}

function money(v){
    return "₱"+Number(v).toLocaleString();
}

function sanitize(v){
    return String(v)
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* =========================
DEFAULT USERS
========================= */

if(!localStorage.getItem("users")){

save("users",[

{
    username:"admin",
    password:btoa("admin123"),
    role:"Super Admin"
}

]);

}

/* =========================
DATABASE
========================= */

let invoices=load("invoices");
let inventory=load("inventory");
let customers=load("customers");
let ledger=load("ledger");
let logs=load("logs");

/* =========================
AUDIT
========================= */

function addLog(action){

logs.push({

    date:new Date().toLocaleString(),
    action

});

save("logs",logs);

}

/* =========================
LOGIN
========================= */

if(!sessionStorage.getItem("user")){
    renderLogin();
}else{
    renderApp();
}

function renderLogin(){

document.getElementById("app").innerHTML=`

<div class="login">

<div class="login-card">

<h1>Quelou ERP</h1>

<p>AI Accounting System</p>

<input class="input" id="user" placeholder="Username">
<input class="input" id="pass" type="password" placeholder="Password">

<button class="btn primary w100" onclick="login()" style="margin-top:15px;">
LOGIN
</button>

</div>

</div>

`;

}

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

let users=load("users");

let found=users.find(x=>

x.username===user &&
x.password===btoa(pass)

);

if(!found){
    alert("Invalid Login");
    return;
}

sessionStorage.setItem("user",JSON.stringify(found));

location.reload();

}

function logout(){

sessionStorage.removeItem("user");
location.reload();

}

/* =========================
APP
========================= */

function renderApp(){

let user=JSON.parse(sessionStorage.getItem("user"));

document.getElementById("app").innerHTML=`

<div class="app">

<div class="sidebar">

<h2>Quelou ERP</h2>
<p>${user.role}</p>

<div class="menu">

<button onclick="invoicePopup()">➕ Create Invoice</button>

<button onclick="inventoryPopup()">📦 Add Inventory</button>

<button onclick="customerPopup()">👤 Customer Master</button>

<button onclick="financialReports()">📑 Financial Reports</button>

<button onclick="showAudit()">🧾 Audit Trail</button>

<button onclick="backup()">⬇️ Backup</button>

<button onclick="restore()">♻️ Restore</button>

<button onclick="logout()">🚪 Logout</button>

</div>

</div>

<div class="main">

<div class="topbar">

<h2>Quelou ERP AI PRO</h2>

<div>
<input class="input" id="ai" placeholder="Ask AI..." style="width:220px;">
<button class="btn primary" onclick="askAI()">Ask</button>
</div>

</div>

<div class="cards">

<div class="card">
<h3>Total Sales</h3>
<div class="value">
${money(invoices.reduce((a,b)=>a+b.total,0))}
</div>
</div>

<div class="card">
<h3>Total Invoices</h3>
<div class="value">${invoices.length}</div>
</div>

<div class="card">
<h3>Inventory Items</h3>
<div class="value">${inventory.length}</div>
</div>

<div class="card">
<h3>Customers</h3>
<div class="value">${customers.length}</div>
</div>

</div>

<!-- INVOICES -->

<div class="table-box">

<div class="table-head">

<h2>Invoices</h2>

<div>

<button class="btn green" onclick="exportExcel('invoiceTable','Invoices')">
Excel
</button>

<button class="btn red" onclick="exportPDF('invoiceTable','Invoices Report')">
PDF
</button>

</div>

</div>

<table id="invoiceTable"></table>

</div>

<!-- INVENTORY -->

<div class="table-box">

<div class="table-head">

<h2>Inventory</h2>

<div>

<button class="btn green" onclick="exportExcel('inventoryTable','Inventory')">
Excel
</button>

<button class="btn red" onclick="exportPDF('inventoryTable','Inventory Report')">
PDF
</button>

</div>

</div>

<table id="inventoryTable"></table>

</div>

<!-- LEDGER -->

<div class="table-box">

<div class="table-head">

<h2>General Ledger</h2>

<div>

<button class="btn green" onclick="exportExcel('ledgerTable','Ledger')">
Excel
</button>

<button class="btn red" onclick="exportPDF('ledgerTable','General Ledger')">
PDF
</button>

</div>

</div>

<table id="ledgerTable"></table>

</div>

</div>

</div>

<div class="popup" id="popup">

<div class="popup-box" id="popupBox"></div>

</div>

`;

renderInvoices();
renderInventory();
renderLedger();

}

/* =========================
POPUP
========================= */

function closePopup(){
    document.getElementById("popup").style.display="none";
}

function showPopup(html){

document.getElementById("popup").style.display="flex";
document.getElementById("popupBox").innerHTML=html;

}

/* =========================
INVOICE
========================= */

function invoicePopup(){

showPopup(`

<h2>Create Invoice</h2>

<div class="grid">

<input class="input" id="customer" placeholder="Customer Name">

<input class="input" id="amount" type="number" placeholder="Amount">

<select class="input" id="status">

<option>Pending</option>
<option>Paid</option>

</select>

<input class="input" id="due" type="date">

</div>

<textarea id="remarks" placeholder="Remarks"></textarea>

<div class="action">

<button class="btn primary" onclick="saveInvoice()">
Save Invoice
</button>

<button class="btn red" onclick="closePopup()">
Close
</button>

</div>

`);

}

function saveInvoice(){

let customer=document.getElementById("customer").value;
let amount=Number(document.getElementById("amount").value);

if(customer==="" || amount<=0){
    alert("Complete required fields");
    return;
}

let vat=amount*0.12;

let total=amount+vat;

let inv={

invoice:"INV-"+Date.now(),
customer,
amount,
vat,
total,
status:document.getElementById("status").value,
due:document.getElementById("due").value,
remarks:document.getElementById("remarks").value,
date:new Date().toLocaleString()

};

invoices.push(inv);

ledger.push({

date:new Date().toLocaleString(),
reference:inv.invoice,
debit:inv.status==="Paid" ? "Cash" : "Accounts Receivable",
credit:"Sales Revenue",
amount:inv.total

});

save("invoices",invoices);
save("ledger",ledger);

addLog("Created Invoice "+inv.invoice);

renderInvoices();
renderLedger();

closePopup();

alert("Invoice Saved");

}

/* =========================
RENDER INVOICES
========================= */

function renderInvoices(){

let html=`

<tr>
<th>Invoice</th>
<th>Customer</th>
<th>Amount</th>
<th>VAT</th>
<th>Total</th>
<th>Status</th>
<th>Date</th>
</tr>

`;

invoices.forEach(i=>{

html+=`

<tr>

<td>${sanitize(i.invoice)}</td>

<td>${sanitize(i.customer)}</td>

<td>${money(i.amount)}</td>

<td>${money(i.vat)}</td>

<td>${money(i.total)}</td>

<td>

<span class="${
i.status==="Paid"
? "status-paid"
: "status-pending"
}">

${i.status}

</span>

</td>

<td>${i.date}</td>

</tr>

`;

});

document.getElementById("invoiceTable").innerHTML=html;

}

/* =========================
INVENTORY
========================= */

function inventoryPopup(){

showPopup(`

<h2>Add Inventory</h2>

<div class="grid">

<input class="input" id="item" placeholder="Item">

<input class="input" id="qty" type="number" placeholder="Qty">

<input class="input" id="warehouse" placeholder="Warehouse">

<input class="input" id="cost" type="number" placeholder="Cost">

</div>

<div class="action">

<button class="btn green" onclick="saveInventory()">
Save
</button>

<button class="btn red" onclick="closePopup()">
Close
</button>

</div>

`);

}

function saveInventory(){

let data={

item:document.getElementById("item").value,
qty:Number(document.getElementById("qty").value),
warehouse:document.getElementById("warehouse").value,
cost:Number(document.getElementById("cost").value)

};

inventory.push(data);

save("inventory",inventory);

addLog("Added Inventory "+data.item);

renderInventory();

closePopup();

alert("Inventory Saved");

}

function renderInventory(){

let html=`

<tr>
<th>Item</th>
<th>Qty</th>
<th>Warehouse</th>
<th>Cost</th>
</tr>

`;

inventory.forEach(i=>{

html+=`

<tr>

<td>${i.item}</td>
<td>${i.qty}</td>
<td>${i.warehouse}</td>
<td>${money(i.cost)}</td>

</tr>

`;

});

document.getElementById("inventoryTable").innerHTML=html;

}

/* =========================
CUSTOMERS
========================= */

function customerPopup(){

showPopup(`

<h2>Customer Master</h2>

<div class="grid">

<input class="input" id="cname" placeholder="Customer Name">
<input class="input" id="ccontact" placeholder="Contact">
<input class="input" id="caddress" placeholder="Address">
<input class="input" id="ctin" placeholder="TIN">

</div>

<div class="action">

<button class="btn primary" onclick="saveCustomer()">
Save Customer
</button>

<button class="btn red" onclick="closePopup()">
Close
</button>

</div>

`);

}

function saveCustomer(){

let c={

name:document.getElementById("cname").value,
contact:document.getElementById("ccontact").value,
address:document.getElementById("caddress").value,
tin:document.getElementById("ctin").value

};

customers.push(c);

save("customers",customers);

addLog("Added Customer "+c.name);

closePopup();

alert("Customer Saved");

}

/* =========================
LEDGER
========================= */

function renderLedger(){

let html=`

<tr>
<th>Date</th>
<th>Reference</th>
<th>Debit</th>
<th>Credit</th>
<th>Amount</th>
</tr>

`;

ledger.forEach(l=>{

html+=`

<tr>

<td>${l.date}</td>
<td>${l.reference}</td>
<td>${l.debit}</td>
<td>${l.credit}</td>
<td>${money(l.amount)}</td>

</tr>

`;

});

document.getElementById("ledgerTable").innerHTML=html;

}

/* =========================
REAL REPORTS
========================= */

function financialReports(){

let totalSales=invoices.reduce((a,b)=>a+b.total,0);

let paid=invoices
.filter(i=>i.status==="Paid")
.reduce((a,b)=>a+b.total,0);

let pending=invoices
.filter(i=>i.status==="Pending")
.reduce((a,b)=>a+b.total,0);

showPopup(`

<h2>Financial Reports</h2>

<div class="report-card">

<h3>Income Statement</h3>

<p>Total Revenue: <b>${money(totalSales)}</b></p>

<p>Paid Revenue: <b>${money(paid)}</b></p>

<p>Pending Revenue: <b>${money(pending)}</b></p>

</div>

<div class="report-card">

<h3>Balance Sheet</h3>

<p>Accounts Receivable:
<b>${money(pending)}</b></p>

<p>Cash:
<b>${money(paid)}</b></p>

<p>Inventory Assets:
<b>${money(
inventory.reduce((a,b)=>a+(b.qty*b.cost),0)
)}</b></p>

</div>

<div class="report-card">

<h3>VAT Summary</h3>

<p>Total VAT Collected:
<b>${money(
invoices.reduce((a,b)=>a+b.vat,0)
)}</b></p>

</div>

<div class="action">

<button class="btn green"
onclick="printReports()">
Print
</button>

<button class="btn primary"
onclick="downloadReportsPDF()">
Save PDF
</button>

<button class="btn orange"
onclick="downloadReportsExcel()">
Save Excel
</button>

<button class="btn red"
onclick="closePopup()">
Close
</button>

</div>

`);

}

/* =========================
REPORT EXPORT
========================= */

function printReports(){

window.print();

}

function exportPDF(tableId,title){

const { jsPDF } = window.jspdf;

let doc=new jsPDF();

doc.text(title,14,15);

doc.autoTable({

html:"#"+tableId,
startY:25,
theme:"grid"

});

doc.save(title+".pdf");

}

function exportExcel(tableId,file){

let table=document.getElementById(tableId);

let wb=XLSX.utils.table_to_book(table);

XLSX.writeFile(wb,file+".xlsx");

}

function downloadReportsPDF(){

const { jsPDF } = window.jspdf;

let doc=new jsPDF();

doc.text("Quelou ERP Financial Reports",14,20);

doc.text(
"Total Sales: "+
money(invoices.reduce((a,b)=>a+b.total,0)),
14,
40
);

doc.text(
"Total VAT: "+
money(invoices.reduce((a,b)=>a+b.vat,0)),
14,
50
);

doc.save("FinancialReports.pdf");

}

function downloadReportsExcel(){

let data=[

["Total Sales",
invoices.reduce((a,b)=>a+b.total,0)],

["Total VAT",
invoices.reduce((a,b)=>a+b.vat,0)]

];

let ws=XLSX.utils.aoa_to_sheet(data);

let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Reports");

XLSX.writeFile(wb,"FinancialReports.xlsx");

}

/* =========================
AUDIT
========================= */

function showAudit(){

let html=`

<h2>Audit Trail</h2>

<table>

<tr>
<th>Date</th>
<th>Action</th>
</tr>

`;

logs.forEach(l=>{

html+=`

<tr>

<td>${l.date}</td>
<td>${l.action}</td>

</tr>

`;

});

html+=`</table>

<div class="action">

<button class="btn red" onclick="closePopup()">
Close
</button>

</div>
`;

showPopup(html);

}

/* =========================
BACKUP
========================= */

function backup(){

let backupData={

invoices,
inventory,
customers,
ledger,
logs

};

let blob=new Blob(
[JSON.stringify(backupData,null,2)],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="QuelouERPBackup.json";

a.click();

}

/* =========================
RESTORE
========================= */

function restore(){

let input=document.createElement("input");

input.type="file";

input.onchange=e=>{

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(evt){

let data=JSON.parse(evt.target.result);

Object.keys(data).forEach(k=>{

save(k,data[k]);

});

alert("Restore Complete");

location.reload();

};

reader.readAsText(file);

};

input.click();

}

/* =========================
AI
========================= */

function askAI(){

let q=document.getElementById("ai")
.value
.toLowerCase();

if(q.includes("sales")){

alert(

"Total Sales: "+

money(

invoices.reduce((a,b)=>a+b.total,0)

)

);

}

else if(q.includes("pending")){

let p=invoices
.filter(i=>i.status==="Pending")
.reduce((a,b)=>a+b.total,0);

alert("Pending Receivables: "+money(p));

}

else if(q.includes("vat")){

alert(

"VAT Collected: "+

money(

invoices.reduce((a,b)=>a+b.vat,0)

)

);

}

else{

alert(

"AI Analysis\n\n"+

"• Revenue performance stable\n"+
"• Monitor pending invoices\n"+
"• Inventory levels healthy\n"+
"• Cashflow positive"

);

}

}

</script>
</body>
</html>
