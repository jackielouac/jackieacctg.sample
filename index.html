<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quelou ERP AI PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
:root{
    --blue:#0a84ff; --green:#22c55e; --orange:#f59e0b; --red:#ef4444; --bg:#f4f7fb;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:var(--bg);}
button{cursor:pointer;}
.login{min-height:100vh;display:flex;justify-content:center;align-items:center;}
.login-card{width:100%;max-width:400px;background:white;padding:35px;border-radius:20px;}
.input{width:100%;padding:14px;border:none;background:#f1f5f9;border-radius:12px;margin-top:12px;}
.btn{border:none;padding:13px 18px;border-radius:12px;color:white;font-weight:bold;}
.primary{background:var(--blue);} .green{background:var(--green);} .orange{background:var(--orange);} .red{background:var(--red);}
.app{display:flex;}
.sidebar{width:260px;background:white;padding:20px;min-height:100vh;}
.sidebar h2{color:var(--blue);}
.menu{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.menu button{border:none;padding:14px;border-radius:12px;text-align:left;background:#f1f5f9;font-weight:bold;}
.menu button:hover{background:var(--blue);color:white;}
.main{flex:1;padding:20px;}
.topbar{background:white;padding:20px;border-radius:20px;margin-bottom:20px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:20px;}
.card{background:white;padding:20px;border-radius:20px;}
.card h3{color:gray;}
.value{font-size:28px;margin-top:10px;font-weight:bold;}
.table-box{background:white;padding:20px;border-radius:20px;margin-bottom:20px;overflow:auto;}
table{width:100%;border-collapse:collapse;min-width:900px;}
th,td{padding:12px;border-bottom:1px solid #eee;text-align:left;font-size:14px;}
.status-paid{background:#dcfce7;color:#166534;padding:6px 10px;border-radius:999px;font-size:12px;}
.status-pending{background:#fef3c7;color:#92400e;padding:6px 10px;border-radius:999px;font-size:12px;}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;padding:20px;z-index:999;}
.popup-box{width:100%;max-width:1000px;max-height:90vh;overflow:auto;background:white;border-radius:20px;padding:25px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
textarea{width:100%;min-height:90px;margin-top:12px;border:none;border-radius:12px;padding:14px;background:#f1f5f9;}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px;}
.print-area{background:white;padding:40px;width:800px;margin:auto;}
.print-title{text-align:center;margin-bottom:20px;}
.print-title h1{color:var(--blue);}
.invoice-head{display:flex;justify-content:space-between;margin-bottom:20px;}
.invoice-box{border:1px solid #ddd;padding:12px;border-radius:12px;}
.total-box{margin-top:20px;width:300px;margin-left:auto;}
.total-box table{min-width:auto;}
#chatBox{position:fixed;bottom:20px;right:20px;width:350px;height:400px;background:white;border-radius:20px;padding:15px;box-shadow:0 0 15px rgba(0,0,0,0.2);display:flex;flex-direction:column;}
#chatMessages{flex:1;overflow:auto;margin-bottom:10px;}
.chatMessage{padding:8px 12px;border-radius:12px;margin-bottom:6px;max-width:80%;}
.userMsg{background:var(--blue);color:white;align-self:flex-end;}
.aiMsg{background:#eee;color:black;align-self:flex-start;}
#chatInput{display:flex;gap:6px;}
#chatInput input{flex:1;padding:10px;border-radius:12px;border:1px solid #ccc;}
#chatInput button{padding:10px 15px;border:none;background:var(--green);color:white;border-radius:12px;}
@media(max-width:900px){.app{flex-direction:column;}.sidebar{width:100%;min-height:auto;}.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="app"></div>
<div class="popup" id="popup"><div class="popup-box" id="popupBox"></div></div>

<!-- AI CHAT BOX -->
<div id="chatBox">
    <div id="chatMessages"></div>
    <div id="chatInput">
        <input type="text" id="chatPrompt" placeholder="Ask AI..." />
        <button onclick="sendAIMessage()">Send</button>
    </div>
</div>

<script>

/* =========================
STORAGE & MONEY
========================= */

function load(key){ return JSON.parse(localStorage.getItem(key)||"[]"); }
function save(key,data){ localStorage.setItem(key,JSON.stringify(data)); }
function money(v){ return "₱"+Number(v).toLocaleString(undefined,{minimumFractionDigits:2}); }

/* =========================
DEFAULT LOGIN
========================= */

if(!localStorage.getItem("users")){
    save("users",[ { username:"admin", password:btoa("admin123"), role:"Super Admin" } ]);
}

let invoices=load("invoices");
let ledger=load("ledger");
let receipts=load("receipts");

/* =========================
LOGIN
========================= */

if(!sessionStorage.getItem("user")) renderLogin(); else renderApp();

function renderLogin(){
document.getElementById("app").innerHTML=`
<div class="login">
<div class="login-card">
<h1 style="color:#0a84ff;">Quelou ERP</h1>
<p>AI Accounting System</p>
<input id="user" class="input" placeholder="Username">
<input id="pass" type="password" class="input" placeholder="Password">
<button class="btn primary" style="width:100%;margin-top:15px;" onclick="login()">LOGIN</button>
</div>
</div>`;
}

function login(){
let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;
let users=load("users");
let found=users.find(x=>x.username===user && x.password===btoa(pass));
if(!found){alert("Invalid Login");return;}
sessionStorage.setItem("user",JSON.stringify(found));
location.reload();
}
function logout(){sessionStorage.removeItem("user");location.reload();}

/* =========================
APP
========================= */

function renderApp(){
document.getElementById("app").innerHTML=`
<div class="app">
<div class="sidebar">
<h2>Quelou ERP</h2>
<div class="menu">
<button onclick="invoiceForm()">➕ Create Invoice</button>
<button onclick="receiptForm()">🧾 Official Receipt</button>
<button onclick="financialReport()">📑 Financial Reports</button>
<button onclick="logout()">🚪 Logout</button>
</div>
</div>
<div class="main">
<div class="topbar"><h2>Quelou ERP AI PRO</h2></div>
<div class="cards">
<div class="card"><h3>Total Sales</h3><div class="value">${money(invoices.reduce((a,b)=>a+b.total,0))}</div></div>
<div class="card"><h3>Total Receipts</h3><div class="value">${money(receipts.reduce((a,b)=>a+b.amount,0))}</div></div>
<div class="card"><h3>Total Invoices</h3><div class="value">${invoices.length}</div></div>
</div>
${renderInvoices()}
${renderReceipts()}
${renderLedger()}
</div>
</div>`;
}

/* =========================
RENDER TABLES
========================= */
function renderInvoices(){
return `<div class="table-box"><h2>Invoices</h2><br>
<table id="invoiceTable">
<tr><th>Invoice No</th><th>Customer</th><th>Subtotal</th><th>VAT</th><th>Total</th><th>Status</th><th>Action</th></tr>
${invoices.map(i=>`<tr>
<td>${i.invoiceNo}</td>
<td>${i.customer}</td>
<td>${money(i.subtotal)}</td>
<td>${money(i.vat)}</td>
<td>${money(i.total)}</td>
<td><span class="${i.status==="PAID"?"status-paid":"status-pending"}">${i.status}</span></td>
<td><button class="btn primary" onclick='printInvoice(${JSON.stringify(i)})'>Print</button></td>
</tr>`).join("")}
</table></div>`;
}
function renderReceipts(){
return `<div class="table-box"><h2>Official Receipts</h2><br>
<table>
<tr><th>OR No</th><th>Customer</th><th>Amount</th><th>Date</th><th>Action</th></tr>
${receipts.map(r=>`<tr>
<td>${r.orNo}</td>
<td>${r.customer}</td>
<td>${money(r.amount)}</td>
<td>${r.date}</td>
<td><button class="btn green" onclick='printReceipt(${JSON.stringify(r)})'>Print</button></td>
</tr>`).join("")}
</table></div>`;
}
function renderLedger(){
return `<div class="table-box"><h2>Detailed Accounting Entries</h2><br>
<table>
<tr><th>Date</th><th>Reference</th><th>Account Title</th><th>Debit</th><th>Credit</th></tr>
${ledger.map(l=>`<tr>
<td>${l.date}</td>
<td>${l.reference}</td>
<td>${l.account}</td>
<td>${l.debit?money(l.debit):"-"}</td>
<td>${l.credit?money(l.credit):"-"}</td>
</tr>`).join("")}
</table></div>`;
}

/* =========================
AI CHAT
========================= */

async function sendAIMessage(){
let prompt=document.getElementById("chatPrompt").value.trim();
if(!prompt)return;
addChatMessage(prompt,"user");
document.getElementById("chatPrompt").value="";
let response=await getAIResponse(prompt);
addChatMessage(response,"ai");
}

function addChatMessage(msg,type){
let div=document.createElement("div");
div.className="chatMessage "+(type==="user"?"userMsg":"aiMsg");
div.innerText=msg;
document.getElementById("chatMessages").appendChild(div);
document.getElementById("chatMessages").scrollTop=document.getElementById("chatMessages").scrollHeight;
}

/* MOCK AI RESPONSE (replace with real API for full AI) */
async function getAIResponse(prompt){
    // Replace with OpenAI fetch API if available
    return new Promise(resolve=>setTimeout(()=>resolve("AI says: "+prompt),500));
}

/* =========================
OTHER ERP FUNCTIONS
========================= */

/* Popup, Invoice, Receipt, Print, Financial Report functions remain the same as in your original code... 
   For brevity, you can copy all your previous functions (invoiceForm, saveInvoice, receiptForm, saveReceipt, printInvoice, printReceipt, financialReport) here
*/

</script>
</body>
</html>
