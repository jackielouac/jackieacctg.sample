<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quelou ERP - AJ Accounting System</title>

<script>

/* ========================= */
/* DATABASE */
/* ========================= */

let users = JSON.parse(localStorage.getItem("users")) || [
    {
        username:"jackie",
        password:"@dm1nEvo"
    }
];

let customers = JSON.parse(localStorage.getItem("customers")) || [];
let suppliers = JSON.parse(localStorage.getItem("suppliers")) || [];
let invoices = JSON.parse(localStorage.getItem("invoices")) || [];
let receipts = JSON.parse(localStorage.getItem("receipts")) || [];
let purchases = JSON.parse(localStorage.getItem("purchases")) || [];
let disbursements = JSON.parse(localStorage.getItem("disbursements")) || [];
let auditLogs = JSON.parse(localStorage.getItem("auditLogs")) || [];

/* ========================= */
/* LOGIN */
/* ========================= */

function login(){

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    let found = users.find(u =>
        u.username === user &&
        u.password === pass
    );

    if(found){

        document.getElementById("loginScreen").style.display = "none";

        document.querySelector(".app").style.display = "flex";

        document.getElementById("currentUser").innerHTML =
        found.username;

        renderInvoices();

        updateCards();

    }else{

        alert("Invalid Login");

    }

}

/* ========================= */
/* LOGOUT */
/* ========================= */

function logout(){

    if(confirm("Logout Session?")){

        document.querySelector(".app").style.display = "none";

        document.getElementById("loginScreen").style.display = "flex";

        document.getElementById("username").value = "";
        document.getElementById("password").value = "";

    }

}

/* ========================= */
/* POPUP */
/* ========================= */

function openPopup(id){

    let popup = document.getElementById(id);

    if(popup){

        popup.style.display = "flex";

    }

}

function closePopup(id){

    let popup = document.getElementById(id);

    if(popup){

        popup.style.display = "none";

    }

}

/* ========================= */
/* AUDIT */
/* ========================= */

function addAudit(action){

    auditLogs.push({
        action:action,
        date:new Date().toLocaleString()
    });

    localStorage.setItem(
        "auditLogs",
        JSON.stringify(auditLogs)
    );

}

/* ========================= */
/* SAVE CUSTOMER */
/* ========================= */

function saveCustomer(){

    let customer = {

        name:document.getElementById("custName").value,
        address:document.getElementById("custAddress").value,
        tin:document.getElementById("custTIN").value,
        contact:document.getElementById("custContact").value

    };

    customers.push(customer);

    localStorage.setItem(
        "customers",
        JSON.stringify(customers)
    );

    addAudit(
        "Customer Created : " + customer.name
    );

    updateCards();

    closePopup("customerPopup");

    alert("Customer Saved");

}

/* ========================= */
/* SAVE INVOICE */
/* ========================= */

function saveInvoice(){

    let invoice = {

        number:document.getElementById("invNumber").value,
        customer:document.getElementById("invCustomer").value,
        amount:document.getElementById("invAmount").value,
        status:document.getElementById("invStatus").value,
        remarks:document.getElementById("invRemarks").value,
        date:new Date().toLocaleString()

    };

    invoices.push(invoice);

    localStorage.setItem(
        "invoices",
        JSON.stringify(invoices)
    );

    addAudit(
        "Sales Invoice Saved : " + invoice.number
    );

    renderInvoices();

    updateCards();

    closePopup("invoicePopup");

    alert("Invoice Saved");

}

/* ========================= */
/* SAVE RECEIPT */
/* ========================= */

function saveReceipt(){

    let receipt = {

        number:document.getElementById("rcptNumber").value,
        customer:document.getElementById("rcptCustomer").value,
        amount:document.getElementById("rcptAmount").value,
        remarks:document.getElementById("rcptRemarks").value,
        date:new Date().toLocaleString()

    };

    receipts.push(receipt);

    localStorage.setItem(
        "receipts",
        JSON.stringify(receipts)
    );

    addAudit(
        "Collection Saved : " + receipt.number
    );

    updateCards();

    closePopup("receiptPopup");

    alert("Collection Saved");

}

/* ========================= */
/* SAVE PURCHASE */
/* ========================= */

function savePurchase(){

    let purchase = {

        number:document.getElementById("poNumber").value,
        supplier:document.getElementById("poSupplier").value,
        amount:document.getElementById("poAmount").value,
        remarks:document.getElementById("poRemarks").value,
        date:new Date().toLocaleString()

    };

    purchases.push(purchase);

    localStorage.setItem(
        "purchases",
        JSON.stringify(purchases)
    );

    addAudit(
        "Purchase Saved : " + purchase.number
    );

    closePopup("purchasePopup");

    alert("Purchase Saved");

}

/* ========================= */
/* SAVE DISBURSEMENT */
/* ========================= */

function saveDisbursement(){

    let disbursement = {

        number:document.getElementById("cvNumber").value,
        payee:document.getElementById("cvPayee").value,
        amount:document.getElementById("cvAmount").value,
        remarks:document.getElementById("cvRemarks").value,
        date:new Date().toLocaleString()

    };

    disbursements.push(disbursement);

    localStorage.setItem(
        "disbursements",
        JSON.stringify(disbursements)
    );

    addAudit(
        "Disbursement Saved : " + disbursement.number
    );

    closePopup("disbursementPopup");

    alert("Disbursement Saved");

}

/* ========================= */
/* DASHBOARD */
/* ========================= */

function updateCards(){

    let sales = 0;
    let collection = 0;

    invoices.forEach(i => {
        sales += Number(i.amount || 0);
    });

    receipts.forEach(r => {
        collection += Number(r.amount || 0);
    });

    document.getElementById("totalSales").innerHTML =
    "₱" + sales.toLocaleString();

    document.getElementById("totalCollected").innerHTML =
    "₱" + collection.toLocaleString();

    document.getElementById("receivables").innerHTML =
    "₱" + (sales - collection).toLocaleString();

    document.getElementById("totalCustomers").innerHTML =
    customers.length;

}

/* ========================= */
/* CLICKABLE TABLE */
/* ========================= */

function renderInvoices(){

    let table =
    document.getElementById("transactionTable");

    table.innerHTML = `

    <tr>
        <th>Invoice</th>
        <th>Customer</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Date</th>
    </tr>

    `;

    invoices.forEach((inv,index)=>{

        table.innerHTML += `

        <tr onclick="viewInvoice(${index})"
        style="cursor:pointer;">

            <td>${inv.number || ''}</td>

            <td>${inv.customer || ''}</td>

            <td>
                ₱${Number(inv.amount || 0)
                .toLocaleString()}
            </td>

            <td>

                <span class="${
                    inv.status === 'Paid'
                    ? 'status-paid'
                    : 'status-pending'
                }">

                    ${inv.status || 'Pending'}

                </span>

            </td>

            <td>${inv.date || ''}</td>

        </tr>

        `;

    });

}

/* ========================= */
/* VIEW INVOICE */
/* ========================= */

function viewInvoice(index){

    let inv = invoices[index];

    let html = `

    <div class="ai-box">

        <h2>Invoice Details</h2>

        <br>

        <b>Invoice No:</b>
        ${inv.number}

        <br><br>

        <b>Customer:</b>
        ${inv.customer}

        <br><br>

        <b>Amount:</b>
        ₱${Number(inv.amount)
        .toLocaleString()}

        <br><br>

        <b>Status:</b>
        ${inv.status}

        <br><br>

        <b>Remarks:</b>
        ${inv.remarks}

        <br><br>

        <b>Date:</b>
        ${inv.date}

    </div>

    `;

    document.getElementById("reportContent").innerHTML =
    html;

    openPopup("reportPopup");

}

/* ========================= */
/* SIMPLE REPORTS */
/* ========================= */

function openReceivableModule(){

    generateSalesReport();

}

function openPayablesLedger(){

    openSupplierMaster();

}

function openPaidModule(){

    let paidInvoices =
    invoices.filter(i => i.status === "Paid");

    let html = `

    <h2>Paid Invoices</h2>

    <table>

    <tr>
        <th>Invoice</th>
        <th>Customer</th>
        <th>Amount</th>
    </tr>

    `;

    paidInvoices.forEach(inv=>{

        html += `

        <tr>

            <td>${inv.number}</td>
            <td>${inv.customer}</td>

            <td>
                ₱${Number(inv.amount)
                .toLocaleString()}
            </td>

        </tr>

        `;

    });

    html += `</table>`;

    document.getElementById("reportContent").innerHTML =
    html;

    openPopup("reportPopup");

}

function openCustomerLedger(){

    openCustomerMaster();

}

function openAgingReport(){

    let html = `

    <div class="ai-box">

        <h2>Aging Report</h2>

        <br>

        Pending Receivables:
        ₱${(
            invoices.reduce((a,b)=>
            a + Number(b.amount || 0),0)

            -

            receipts.reduce((a,b)=>
            a + Number(b.amount || 0),0)

        ).toLocaleString()}

    </div>

    `;

    document.getElementById("reportContent").innerHTML =
    html;

    openPopup("reportPopup");

}

function openPurchaseReport(){

    openSupplierMaster();

}

function openDisbursementReport(){

    let html = `

    <h2>Disbursement Report</h2>

    <table>

    <tr>
        <th>CV No</th>
        <th>Payee</th>
        <th>Amount</th>
    </tr>

    `;

    disbursements.forEach(d=>{

        html += `

        <tr>

            <td>${d.number}</td>
            <td>${d.payee}</td>

            <td>
                ₱${Number(d.amount)
                .toLocaleString()}
            </td>

        </tr>

        `;

    });

    html += `</table>`;

    document.getElementById("reportContent").innerHTML =
    html;

    openPopup("reportPopup");

}

/* ========================= */
/* PDF */
/* ========================= */

function downloadPDF(){

    const { jsPDF } = window.jspdf;

    let doc = new jsPDF();

    let text =
    document.getElementById("reportContent")
    .innerText;

    doc.text(text || "No Report Opened",10,10);

    doc.save("ERP_REPORT.pdf");

}

/* ========================= */
/* EXCEL */
/* ========================= */

function downloadExcel(){

    let rows = [
        ["Invoice","Customer","Amount"]
    ];

    invoices.forEach(inv=>{

        rows.push([
            inv.number,
            inv.customer,
            inv.amount
        ]);

    });

    let csvContent =
    "data:text/csv;charset=utf-8," +
    rows.map(r=>r.join(",")).join("\n");

    let link =
    document.createElement("a");

    link.href = encodeURI(csvContent);

    link.download = "sales_report.csv";

    document.body.appendChild(link);

    link.click();

}

/* ========================= */
/* AUDIT TRAIL */
/* ========================= */

function openAuditTrail(){

    let html = `

    <h2>Audit Trail</h2>

    <table>

    <tr>
        <th>Date</th>
        <th>Action</th>
    </tr>

    `;

    auditLogs.forEach(log=>{

        html += `

        <tr>

            <td>${log.date}</td>
            <td>${log.action}</td>

        </tr>

        `;

    });

    html += `</table>`;

    document.getElementById("reportContent").innerHTML =
    html;

    openPopup("reportPopup");

}

/* ========================= */
/* PROCESS FLOW */
/* ========================= */

function openProcessFlow(){

    let html = `

    <div class="ai-box">

        <h2>ERP Process Flow</h2>

        <br>

        Customer Maintenance
        ➜ Sales Invoice
        ➜ Collection Receipt
        ➜ Receivable Ledger

        <hr style="margin:25px 0;">

        Supplier Maintenance
        ➜ Purchase Entry
        ➜ Cash Disbursement
        ➜ Payables Ledger

    </div>

    `;

    document.getElementById("reportContent").innerHTML =
    html;

    openPopup("reportPopup");

}

/* ========================= */
/* AI CENTER */
/* ========================= */

function openAICenter(){

    generateAISummary();

}

function generateAISummary(){

    let sales = 0;

    invoices.forEach(inv=>{

        sales += Number(inv.amount || 0);

    });

    let html = `

    <div class="ai-box">

        <h2>AI Business Insights</h2>

        <br>

        <h1 style="color:#4ade80;">
            ₱${sales.toLocaleString()}
        </h1>

        <br>

        <ul>

            <li>Follow up pending invoices</li>

            <li>Increase customer collection</li>

            <li>Monitor purchasing expenses</li>

            <li>Review unpaid receivables</li>

        </ul>

    </div>

    `;

    document.getElementById("reportContent").innerHTML =
    html;

    openPopup("reportPopup");

}

/* ========================= */
/* BACKUP */
/* ========================= */

function exportData(){

    let data = {

        customers,
        suppliers,
        invoices,
        receipts,
        purchases,
        disbursements,
        auditLogs

    };

    let blob = new Blob(
        [JSON.stringify(data,null,2)],
        {type:"application/json"}
    );

    let a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download = "ERP_BACKUP.json";

    a.click();

}

/* ========================= */
/* RESET */
/* ========================= */

function clearAllData(){

    if(confirm("Delete ALL records?")){

        localStorage.clear();

        location.reload();

    }

}

/* ========================= */
/* CLOSE POPUP */
/* ========================= */

window.onclick = function(e){

    document.querySelectorAll(".popup")
    .forEach(function(popup){

        if(e.target === popup){

            popup.style.display = "none";

        }

    });

};

</script>
</body>
</html>
