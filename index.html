<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quelou ERP AI Accounting System</title>

<style>

:root{
--blue:#0a84ff;
--green:#30d158;
--orange:#ff9f0a;
--red:#ff453a;
--bg:#f5f7fb;
--card:#ffffff;
--line:#e5e7eb;
--text:#111827;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

.app{
display:flex;
min-height:100vh;
}

.sidebar{
width:300px;
background:white;
padding:25px;
border-right:1px solid #ddd;
overflow:auto;
}

.main{
flex:1;
padding:25px;
padding-top:90px;
}

.topbar{
position:fixed;
top:0;
left:300px;
right:0;
height:70px;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
border-bottom:1px solid #ddd;
z-index:999;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
margin-top:20px;
}

.menu button{
padding:15px;
border:none;
border-radius:14px;
background:#f3f4f6;
cursor:pointer;
font-weight:bold;
}

.menu button:hover{
background:var(--blue);
color:white;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:25px;
border-radius:24px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
cursor:pointer;
}

.card:hover{
transform:translateY(-3px);
}

.card h3{
margin-bottom:10px;
color:gray;
}

.value{
font-size:28px;
font-weight:bold;
}

.table-box{
background:white;
padding:25px;
border-radius:24px;
margin-bottom:25px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
text-align:left;
}

.primary-btn,
.success-btn,
.danger-btn{
padding:12px 16px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.primary-btn{
background:var(--blue);
color:white;
}

.success-btn{
background:var(--green);
color:white;
}

.danger-btn{
background:var(--red);
color:white;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.popup-box{
background:white;
padding:30px;
border-radius:28px;
width:100%;
max-width:1000px;
max-height:90vh;
overflow:auto;
}

.popup-box input,
.popup-box select,
.popup-box textarea{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:14px;
background:#f3f4f6;
}

.login-wrapper{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-card{
width:100%;
max-width:420px;
background:white;
padding:40px;
border-radius:30px;
box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.login-input{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:14px;
background:#f3f4f6;
}

.login-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:var(--blue);
color:white;
font-weight:bold;
cursor:pointer;
}

.status-paid{
background:#d1fadf;
color:#027a48;
padding:6px 12px;
border-radius:999px;
font-weight:bold;
}

.status-pending{
background:#fef0c7;
color:#b54708;
padding:6px 12px;
border-radius:999px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

function loadData(key){
return JSON.parse(localStorage.getItem(key)) || [];
}

function saveData(key,data){
localStorage.setItem(key,JSON.stringify(data));
}

function sanitize(str){
return String(str)
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

const users=[{
username:"jackie@quelou.com.ph",
password:btoa("admin123"),
role:"Super Admin"
}];

if(!localStorage.getItem("systemUsers")){
saveData("systemUsers",users);
}

let invoices=loadData("invoices");
let ledger=loadData("ledger");
let purchaseRequests=loadData("purchaseRequests");
let purchaseOrders=loadData("purchaseOrders");
let receivingReports=loadData("receivingReports");
let accountsPayable=loadData("accountsPayable");
let checkVouchers=loadData("checkVouchers");
let inventory=loadData("inventory");
let auditLogs=loadData("auditLogs");

function addAudit(action){

auditLogs.push({
date:new Date().toLocaleString(),
action
});

saveData("auditLogs",auditLogs);

}

function renderLogin(){

document.getElementById("app").innerHTML=`

<div class="login-wrapper">

<div class="login-card">

<h1 style="color:#0a84ff;">Quelou ERP</h1>

<br>

<input type="text" id="username" class="login-input" placeholder="Username">

<input type="password" id="password" class="login-input" placeholder="Password">

<button class="login-btn" onclick="login()">
LOGIN
</button>

</div>

</div>

`;

}

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let users=loadData("systemUsers");

let user=users.find(u=>
u.username===username &&
u.password===btoa(password)
);

if(!user){
alert("Invalid Login");
return;
}

sessionStorage.setItem("user",JSON.stringify(user));

location.reload();

}

function logout(){
sessionStorage.removeItem("user");
location.reload();
}

if(!sessionStorage.getItem("user")){
renderLogin();
}else{
renderApp();
}

function renderApp(){

document.getElementById("app").innerHTML=`

<div class="app">

<div class="sidebar">

<h2 style="color:#0a84ff;">Quelou ERP</h2>

<p>AI Philippine Accounting System</p>

<div class="menu">

<button onclick="openInvoicePopup()">
➕ Create Invoice
</button>

<button onclick="openPRForm()">
🛒 Purchase Request
</button>

<button onclick="openPOForm()">
📦 Purchase Order
</button>

<button onclick="openReceivingForm()">
🚚 Receiving Report
</button>

<button onclick="openAPForm()">
💳 Accounts Payable
</button>

<button onclick="openCVForm()">
🏦 Check Voucher
</button>

<button onclick="openInventoryModule()">
📦 Inventory
</button>

<button onclick="financialReports()">
📑 Financial Reports
</button>

<button onclick="maintenanceModule()">
⚙️ Maintenance
</button>

<button onclick="auditTrail()">
🧾 Audit Trail
</button>

<button onclick="backupSystem()">
⬇️ Backup
</button>

<button onclick="restoreSystem()">
♻️ Restore
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

</div>

<div class="main">

<h1>Accounting Dashboard</h1>

<br>

<div class="cards">

<div class="card">
<h3>Total Sales</h3>
<div class="value">
₱${invoices.reduce((a,b)=>a+b.total,0).toLocaleString()}
</div>
</div>

<div class="card">
<h3>Total Invoices</h3>
<div class="value">
${invoices.length}
</div>
</div>

<div class="card">
<h3>Purchase Orders</h3>
<div class="value">
${purchaseOrders.length}
</div>
</div>

<div class="card">
<h3>Inventory Items</h3>
<div class="value">
${inventory.length}
</div>
</div>

</div>

<div class="table-box">

<h2>Invoices</h2>

<table id="invoiceTable"></table>

</div>

<div class="table-box">

<h2>General Ledger</h2>

<table id="ledgerTable"></table>

</div>

</div>

</div>

<div class="topbar">

<h3>Quelou ERP AI PRO</h3>

<div>

<input type="text"
id="aiQuery"
placeholder="Ask AI..."
style="
padding:12px;
border:none;
border-radius:12px;
width:300px;
background:#f3f4f6;
">

<button class="primary-btn" onclick="runAIQuery()">
Ask
</button>

</div>

</div>

<div class="popup" id="popup">

<div class="popup-box" id="popupBox"></div>

</div>

`;

renderInvoices();
renderLedger();

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function openInvoicePopup(){

document.getElementById("popup").style.display="flex";

document.getElementById("popupBox").innerHTML=`

<h2>Create Invoice</h2>

<input type="text" id="customer" placeholder="Customer Name">

<input type="text" id="tin" placeholder="TIN">

<input type="text" id="address" placeholder="Address">

<input type="number" id="amount" placeholder="Amount">

<select id="status">

<option value="Pending">Pending</option>

<option value="Paid">Paid</option>

</select>

<textarea id="remarks" placeholder="Remarks"></textarea>

<button class="primary-btn" onclick="saveInvoice()">
Save Invoice
</button>

<button class="danger-btn" onclick="closePopup()">
Close
</button>

`;

}

function saveInvoice(){

let amount=Number(document.getElementById("amount").value);

let vatAmount=amount*0.12;

let total=amount+vatAmount;

let invoice={

invoice:"INV-"+Date.now(),

customer:document.getElementById("customer").value,

tin:document.getElementById("tin").value,

address:document.getElementById("address").value,

amount,
vatAmount,
total,

status:document.getElementById("status").value,

remarks:document.getElementById("remarks").value,

date:new Date().toLocaleString()

};

invoices.push(invoice);

ledger.push({

date:new Date().toLocaleString(),

reference:invoice.invoice,

debit:
invoice.status==="Paid"
? "Cash"
: "Accounts Receivable",

credit:"Sales Revenue",

amount:invoice.total

});

saveData("invoices",invoices);
saveData("ledger",ledger);

addAudit("Created Invoice");

alert("Invoice Saved");

location.reload();

}

function openPRForm(){

document.getElementById("popup").style.display="flex";

document.getElementById("popupBox").innerHTML=`

<h2>Purchase Request</h2>

<input id="prDepartment" placeholder="Department">

<input id="prRequestor" placeholder="Requestor">

<input id="prItem" placeholder="Item">

<input id="prQty" type="number" placeholder="Quantity">

<input id="prCost" type="number" placeholder="Estimated Cost">

<textarea id="prReason" placeholder="Reason"></textarea>

<button class="primary-btn" onclick="savePR()">
Save PR
</button>

`;

}

function savePR(){

let pr={

prNo:"PR-"+Date.now(),

department:document.getElementById("prDepartment").value,

requestor:document.getElementById("prRequestor").value,

item:document.getElementById("prItem").value,

qty:Number(document.getElementById("prQty").value),

cost:Number(document.getElementById("prCost").value),

reason:document.getElementById("prReason").value,

date:new Date().toLocaleString()

};

purchaseRequests.push(pr);

saveData("purchaseRequests",purchaseRequests);

addAudit("Created PR");

alert("PR Saved");

location.reload();

}

function openPOForm(){

document.getElementById("popup").style.display="flex";

document.getElementById("popupBox").innerHTML=`

<h2>Purchase Order</h2>

<input id="poVendor" placeholder="Vendor">

<input id="poItem" placeholder="Item">

<input id="poQty" type="number" placeholder="Quantity">

<input id="poPrice" type="number" placeholder="Unit Price">

<select id="poTerms">

<option>Cash</option>
<option>30 Days</option>

</select>

<button class="primary-btn" onclick="savePO()">
Save PO
</button>

`;

}

function savePO(){

let qty=Number(document.getElementById("poQty").value);

let price=Number(document.getElementById("poPrice").value);

let po={

poNo:"PO-"+Date.now(),

vendor:document.getElementById("poVendor").value,

item:document.getElementById("poItem").value,

qty,
price,
total:qty*price,

terms:document.getElementById("poTerms").value,

date:new Date().toLocaleString()

};

purchaseOrders.push(po);

saveData("purchaseOrders",purchaseOrders);

addAudit("Created PO");

alert("PO Saved");

location.reload();

}

function openReceivingForm(){

document.getElementById("popup").style.display="flex";

document.getElementById("popupBox").innerHTML=`

<h2>Receiving Report</h2>

<input id="rrVendor" placeholder="Vendor">

<input id="rrItem" placeholder="Item">

<input id="rrQty" type="number" placeholder="Quantity Received">

<input id="rrWarehouse" placeholder="Warehouse">

<button class="primary-btn" onclick="saveReceiving()">
Save Receiving
</button>

`;

}

function saveReceiving(){

let rr={

rrNo:"RR-"+Date.now(),

vendor:document.getElementById("rrVendor").value,

item:document.getElementById("rrItem").value,

qty:Number(document.getElementById("rrQty").value),

warehouse:document.getElementById("rrWarehouse").value,

date:new Date().toLocaleString()

};

receivingReports.push(rr);

inventory.push({

item:rr.item,
qty:rr.qty,
warehouse:rr.warehouse

});

saveData("receivingReports",receivingReports);

saveData("inventory",inventory);

addAudit("Created Receiving");

alert("Receiving Saved");

location.reload();

}

function openAPForm(){

document.getElementById("popup").style.display="flex";

document.getElementById("popupBox").innerHTML=`

<h2>Accounts Payable</h2>

<input id="apVendor" placeholder="Vendor">

<input id="apInvoice" placeholder="Invoice No">

<input id="apAmount" type="number" placeholder="Amount">

<button class="primary-btn" onclick="saveAP()">
Save AP
</button>

`;

}

function saveAP(){

let ap={

apNo:"AP-"+Date.now(),

vendor:document.getElementById("apVendor").value,

invoice:document.getElementById("apInvoice").value,

amount:Number(document.getElementById("apAmount").value),

date:new Date().toLocaleString()

};

accountsPayable.push(ap);

saveData("accountsPayable",accountsPayable);

addAudit("Created AP");

alert("AP Saved");

location.reload();

}

function openCVForm(){

document.getElementById("popup").style.display="flex";

document.getElementById("popupBox").innerHTML=`

<h2>Check Voucher</h2>

<input id="cvPayee" placeholder="Payee">

<input id="cvBank" placeholder="Bank">

<input id="cvCheck" placeholder="Check No">

<input id="cvAmount" type="number" placeholder="Amount">

<button class="primary-btn" onclick="saveCV()">
Save CV
</button>

`;

}

function saveCV(){

let amount=Number(document.getElementById("cvAmount").value);

let cv={

cvNo:"CV-"+Date.now(),

payee:document.getElementById("cvPayee").value,

bank:document.getElementById("cvBank").value,

checkNo:document.getElementById("cvCheck").value,

amount,

date:new Date().toLocaleString()

};

checkVouchers.push(cv);

ledger.push({

date:new Date().toLocaleString(),

reference:cv.cvNo,

debit:"Accounts Payable",

credit:"Cash in Bank",

amount

});

saveData("checkVouchers",checkVouchers);

saveData("ledger",ledger);

addAudit("Created CV");

alert("CV Saved");

location.reload();

}

function openInventoryModule(){

let html=inventory.map(i=>`

<tr>

<td>${i.item}</td>
<td>${i.qty}</td>
<td>${i.warehouse}</td>

</tr>

`).join("");

let win=window.open();

win.document.write(`

<h1>Inventory</h1>

<table border="1" cellpadding="10">

<tr>

<th>Item</th>
<th>Qty</th>
<th>Warehouse</th>

</tr>

${html}

</table>

`);

}

function renderInvoices(){

let table=document.getElementById("invoiceTable");

table.innerHTML=`

<tr>

<th>Invoice</th>
<th>Customer</th>
<th>Total</th>
<th>Status</th>

</tr>

`;

invoices.forEach(inv=>{

table.innerHTML+=`

<tr>

<td>${sanitize(inv.invoice)}</td>

<td>${sanitize(inv.customer)}</td>

<td>₱${Number(inv.total).toLocaleString()}</td>

<td>

<span class="${
inv.status==="Paid"
? "status-paid"
: "status-pending"
}">

${inv.status}

</span>

</td>

</tr>

`;

});

}

function renderLedger(){

let table=document.getElementById("ledgerTable");

table.innerHTML=`

<tr>

<th>Date</th>
<th>Reference</th>
<th>Debit</th>
<th>Credit</th>
<th>Amount</th>

</tr>

`;

ledger.forEach(item=>{

table.innerHTML+=`

<tr>

<td>${item.date}</td>

<td>${item.reference}</td>

<td>${item.debit}</td>

<td>${item.credit}</td>

<td>₱${Number(item.amount).toLocaleString()}</td>

</tr>

`;

});

}

function financialReports(){

document.getElementById("popup").style.display="flex";

document.getElementById("popupBox").innerHTML=`

<h2>Financial Reports</h2>

<select id="reportType">

<option>Income Statement</option>

<option>General Ledger</option>

<option>Sales Report</option>

<option>Purchase Report</option>

<option>Inventory Report</option>

</select>

<button class="primary-btn" onclick="generateReport()">
Generate
</button>

`;

}

function generateReport(){

let type=document.getElementById("reportType").value;

let win=window.open();

win.document.write("<h1>"+type+"</h1>");

if(type==="Income Statement"){

let sales=invoices.reduce((a,b)=>a+b.total,0);

win.document.write(`

<h2>Total Revenue:
₱${sales.toLocaleString()}
</h2>

`);

}

if(type==="General Ledger"){

win.document.write(`

<table border="1" cellpadding="10">

<tr>

<th>Date</th>
<th>Reference</th>
<th>Debit</th>
<th>Credit</th>
<th>Amount</th>

</tr>

${ledger.map(l=>`

<tr>

<td>${l.date}</td>

<td>${l.reference}</td>

<td>${l.debit}</td>

<td>${l.credit}</td>

<td>${l.amount}</td>

</tr>

`).join("")}

</table>

`);

}

}

function maintenanceModule(){

alert(

"Maintenance Modules\\n\\n"+

"• Customer Master\\n"+
"• Vendor Master\\n"+
"• Employee Master\\n"+
"• User Setup\\n"+
"• Tax Setup\\n"+
"• Chart of Accounts"

);

}

function auditTrail(){

let logs=auditLogs.map(l=>

l.date+" - "+l.action

).join("\\n");

alert(logs || "No Logs");

}

function backupSystem(){

let backup={

invoices,
ledger,
purchaseRequests,
purchaseOrders,
receivingReports,
accountsPayable,
checkVouchers,
inventory,
auditLogs

};

let blob=new Blob(
[JSON.stringify(backup,null,2)],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="QuelouERPBackup.json";

a.click();

}

function restoreSystem(){

let input=document.createElement("input");

input.type="file";

input.onchange=e=>{

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(evt){

let data=JSON.parse(evt.target.result);

Object.keys(data).forEach(k=>{
saveData(k,data[k]);
});

alert("Restore Complete");

location.reload();

};

reader.readAsText(file);

};

input.click();

}

function runAIQuery(){

let q=document.getElementById("aiQuery")
.value
.toLowerCase();

if(q.includes("sales")){

alert(

"Total Sales: ₱"+

invoices
.reduce((a,b)=>a+b.total,0)
.toLocaleString()

);

}

else if(q.includes("inventory")){

alert(

"Inventory Items: "+inventory.length

);

}

else if(q.includes("payables")){

let total=accountsPayable
.reduce((a,b)=>a+b.amount,0);

alert(

"Total Accounts Payable: ₱"+
total.toLocaleString()

);

}

else{

alert(

"AI Analysis:\\n\\n"+

"• Collections are healthy\\n"+
"• Monitor pending invoices\\n"+
"• Inventory levels stable\\n"+
"• Payables within normal range"

);

}

}

</script>

</body>
</html>
